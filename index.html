<html lang="zh-Hant">
<head>

<title>垚垚的成長故事書</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Huninn&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   設計系統 Design Tokens — 依 Gemini 規格
   ============================================================ */
:root{
  --bg:            #FCF9F2; /* 故事書紙張 */
  --ink:           #5D4A44; /* 鉛筆書寫感文字 */
  --ink-soft:      #8A7770;
  --ink-faint:     #BBA89F;
  --pink:          #FFB5C5; /* 主色 溫暖粉紅 */
  --pink-deep:     #F590A8;
  --cream:         #FFF3B0; /* 輔助一 奶油黃 */
  --cream-deep:    #E0C24A;
  --mint:          #A8E6CF; /* 輔助二 薄荷綠 */
  --mint-deep:     #5FAE8E;
  --sky:           #A4D8FA; /* 輔助三 天空藍 */
  --sky-deep:      #5AA8DE;
  --surface:       #FFFFFF;
  --border:        #F1E4D8;
  --shadow:        0 8px 24px rgba(93,74,68,0.08);
  --shadow-sm:     0 4px 12px rgba(93,74,68,0.06);
  --radius-lg:     24px;
  --radius-md:     18px;
  --radius-sm:     12px;
  --radius-pill:   999px;
  --font-zh:       'Huninn', 'jf open 粉圓體', sans-serif;
  --font-en:       'Nunito', sans-serif;
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-en), var(--font-zh);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3,h4,button,input,textarea,select{ font-family:inherit; }
button{ font-family:var(--font-en), var(--font-zh); }

/* 中文優先套用粉圓體 */
.zh, body{ font-family: var(--font-en), var(--font-zh); }

img{ max-width:100%; display:block; }
input,textarea,select{
  font-size:15px; color:var(--ink);
}

/* ============================================================
   版面 Layout
   ============================================================ */
#app{
  display:flex;
  min-height:100vh;
}

/* --- 桌面側邊欄 --- */
.sidebar{
  width:220px;
  background:var(--surface);
  border-right:1.5px dashed var(--border);
  padding:28px 16px;
  display:none;
  flex-direction:column;
  gap:4px;
  position:sticky;
  top:0;
  height:100vh;
}
.sidebar-brand{
  display:flex; align-items:center; gap:10px;
  padding:0 10px 24px;
}
.sidebar-brand .emoji{ font-size:30px; }
.sidebar-brand .title{ font-weight:800; font-size:17px; color:var(--ink); line-height:1.3; }
.sidebar-brand .sub{ font-size:11px; color:var(--ink-faint); }

.nav-item{
  display:flex; align-items:center; gap:12px;
  padding:12px 14px;
  border-radius:var(--radius-md);
  cursor:pointer;
  color:var(--ink-soft);
  font-weight:700;
  font-size:14px;
  border:none;
  background:none;
  text-align:left;
  width:100%;
  transition:background .15s, color .15s, transform .1s;
}
.nav-item .ic{ font-size:20px; }
.nav-item:hover{ background:var(--bg); }
.nav-item.active{
  background:linear-gradient(135deg, var(--pink) 0%, #FFC9D6 100%);
  color:#fff;
  box-shadow:var(--shadow-sm);
}
.nav-item:active{ transform:scale(0.97); }

/* --- 手機底部導覽 --- */
.bottom-nav{
  position:fixed; left:0; right:0; bottom:0;
  background:var(--surface);
  border-top:1.5px dashed var(--border);
  display:flex;
  justify-content:space-around;
  padding:6px 2px max(6px, env(safe-area-inset-bottom));
  z-index:200;
}
.bottom-nav .nav-item{
  flex-direction:column;
  gap:2px;
  padding:6px 4px;
  font-size:10px;
  border-radius:14px;
  flex:1;
}
.bottom-nav .nav-item .ic{ font-size:22px; }
.bottom-nav .nav-item.active{
  background:none;
  color:var(--pink-deep);
  box-shadow:none;
}
.bottom-nav .nav-item.active .ic{
  transform:scale(1.1);
}
.dot{
  width:5px; height:5px; border-radius:50%;
  background:var(--pink-deep);
  margin-top:1px;
}

/* --- 主內容 --- */
main{
  flex:1;
  min-width:0;
  padding:18px 16px 90px;
  max-width:720px;
  margin:0 auto;
  width:100%;
}

@media (min-width: 880px){
  .sidebar{ display:flex; }
  .bottom-nav{ display:none; }
  main{ padding:36px 40px 60px; max-width:760px; }
}

/* --- 頂部列(手機) --- */
.topbar{
  display:flex; align-items:center; gap:10px;
  padding:6px 2px 18px;
}
.topbar .emoji{ font-size:26px; }
.topbar .title{ font-weight:800; font-size:18px; }
.topbar .sub{ font-size:11px; color:var(--ink-faint); }
@media (min-width:880px){ .topbar{ display:none; } }

/* ============================================================
   共用元件 Components
   ============================================================ */
.card{
  background:var(--surface);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  padding:20px;
  border:1px solid var(--border);
}

.section-title{
  display:flex; align-items:center; gap:8px;
  margin:0 0 16px;
  font-size:18px; font-weight:800; color:var(--ink);
}
.section-title .ic{ font-size:20px; }

.btn{
  display:inline-flex; align-items:center; gap:6px;
  border-radius:var(--radius-pill);
  border:1.5px solid var(--border);
  background:var(--bg);
  color:var(--ink-soft);
  font-weight:700;
  font-size:13px;
  padding:10px 18px;
  cursor:pointer;
  transition:transform .12s, box-shadow .12s;
}
.btn:active{ transform:scale(0.96); }
.btn-primary{
  background:linear-gradient(135deg, var(--pink) 0%, #FFC9D6 100%);
  border-color:transparent;
  color:#fff;
  box-shadow:0 4px 14px rgba(245,144,168,0.35);
}
.btn-ghost{ background:transparent; border-color:transparent; }
.btn-sm{ padding:6px 14px; font-size:12px; }
.btn-danger{ background:#FFE3E0; border-color:#FFC9C2; color:#C2554A; }

.fab{
  position:fixed; right:18px; bottom:84px;
  width:54px; height:54px; border-radius:50%;
  background:linear-gradient(135deg, var(--pink) 0%, #FFC9D6 100%);
  color:#fff; font-size:26px;
  display:flex; align-items:center; justify-content:center;
  border:none; cursor:pointer;
  box-shadow:0 6px 18px rgba(245,144,168,0.45);
  z-index:150;
}
@media (min-width:880px){ .fab{ bottom:40px; right:40px; } }

.field{ margin-bottom:14px; }
.field label{
  display:block; font-size:12px; font-weight:700;
  color:var(--ink-soft); margin-bottom:5px;
}
.field input, .field textarea, .field select{
  width:100%;
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  padding:10px 13px;
  background:var(--bg);
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.field textarea{ resize:vertical; min-height:64px; font-family:inherit; }
.field input:focus, .field textarea:focus, .field select:focus{
  border-color:var(--pink-deep);
  box-shadow:0 0 0 4px rgba(255,181,197,0.25);
}

.tag{
  display:inline-flex; align-items:center;
  border-radius:var(--radius-pill);
  font-size:11px; font-weight:800;
  padding:3px 10px;
  letter-spacing:.2px;
}
.tag-pink{ background:#FFE4EA; color:#C2517A; }
.tag-cream{ background:#FFF6D6; color:#8A6E1A; }
.tag-mint{ background:#DCF3E9; color:#2F7A5C; }
.tag-sky{ background:#DCEFFC; color:#2D6FA0; }
.tag-gray{ background:#EFE8E0; color:#8A7770; }

.chip-row{ display:flex; gap:8px; flex-wrap:wrap; }
.chip{
  border-radius:var(--radius-pill);
  border:1.5px solid var(--border);
  background:var(--surface);
  padding:6px 14px;
  font-size:12px; font-weight:700;
  color:var(--ink-soft);
  cursor:pointer;
}
.chip.active{
  background:var(--pink);
  border-color:var(--pink);
  color:#fff;
}

.empty-state{
  text-align:center;
  padding:40px 20px;
  color:var(--ink-faint);
}
.empty-state .ic{ font-size:40px; margin-bottom:10px; }
.empty-state .msg{ font-size:13px; }

/* Modal */
.modal-backdrop{
  position:fixed; inset:0; background:rgba(93,74,68,0.35);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:300; backdrop-filter:blur(2px);
}
@media (min-width:880px){ .modal-backdrop{ align-items:center; } }
.modal{
  background:var(--surface);
  border-radius:28px 28px 0 0;
  width:100%; max-width:560px;
  max-height:88vh; overflow-y:auto;
  padding:24px 22px max(24px, env(safe-area-inset-bottom));
  box-shadow:0 -8px 30px rgba(93,74,68,0.18);
}
@media (min-width:880px){
  .modal{ border-radius:28px; max-height:80vh; padding:28px; }
}
.modal-head{
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:18px;
}
.modal-head h3{ margin:0; font-size:18px; font-weight:800; }
.modal-close{
  background:var(--bg); border:none; border-radius:50%;
  width:32px; height:32px; font-size:16px; color:var(--ink-soft);
  cursor:pointer;
}
.modal-actions{ display:flex; gap:10px; margin-top:18px; }

.row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }

::-webkit-scrollbar{ width:8px; }
::-webkit-scrollbar-thumb{ background:var(--border); border-radius:8px; }

.toast{
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  background:var(--ink); color:#fff; padding:10px 20px;
  border-radius:var(--radius-pill); font-size:13px; font-weight:700;
  z-index:400; box-shadow:var(--shadow);
  opacity:0; transition:opacity .25s, bottom .25s;
  pointer-events:none;
}
.toast.show{ opacity:1; bottom:100px; }
@media (min-width:880px){ .toast{ bottom:40px; } .toast.show{ bottom:50px; } }
</style>
</head>
<body>

<div id="lock-screen" style="position:fixed; inset:0; background:linear-gradient(135deg,#FFE9EE 0%,#FFF6D6 100%); display:flex; align-items:center; justify-content:center; z-index:9999; padding:20px;">
  <div style="background:#fff; border-radius:24px; padding:36px 28px; max-width:340px; width:100%; box-shadow:0 8px 24px rgba(93,74,68,0.15); text-align:center;">
    <div style="font-size:42px; margin-bottom:6px;">🐰🔒</div>
    <div style="font-family:'Huninn',sans-serif; font-size:18px; font-weight:800; color:#5D4A44; margin-bottom:18px;">垚垚的成長故事書</div>
    <input id="lock-input" type="password" placeholder="請輸入密碼" style="width:100%; box-sizing:border-box; border:1.5px solid #F1E4D8; border-radius:12px; padding:12px 14px; font-size:15px; outline:none; margin-bottom:12px; text-align:center;">
    <div id="lock-error" style="color:#C2554A; font-size:12px; height:16px; margin-bottom:8px;"></div>
    <button onclick="checkLockPassword()" style="width:100%; border:none; border-radius:999px; padding:12px; background:linear-gradient(135deg,#FFB5C5,#FFC9D6); color:#fff; font-weight:800; font-size:15px; cursor:pointer;">進入故事書</button>
  </div>
</div>

<div id="app" style="display:none;"></div>
<div id="toast" class="toast"></div>

<script>
/* ============================================================
   簡易密碼鎖 (僅供阻擋路過誤入，非高強度安全機制)
   ============================================================ */
const SITE_PASSWORD = 'rgqsdh159';
const LOCK_SESSION_KEY = 'yaoyao_unlocked';

function checkLockPassword(){
  const val = document.getElementById('lock-input').value;
  if(val === SITE_PASSWORD){
    sessionStorage.setItem(LOCK_SESSION_KEY, '1');
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  } else {
    document.getElementById('lock-error').textContent = '密碼不正確，再試一次';
    document.getElementById('lock-input').value = '';
  }
}

document.getElementById('lock-input').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') checkLockPassword();
});

if(sessionStorage.getItem(LOCK_SESSION_KEY) === '1'){
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

/* ============================================================
   資料層 Data Layer
   ============================================================ */
const STORAGE_KEY = 'yaoyao_growth_db_v1';

const DEFAULT_DB = {
  child: {
    name: '垚垚',
    nickname: '',
    birthdate: '',
    bloodType: '',
    photo: null
  },
  milestones: [],      // {id,date,icon,title,desc,category,sourceType,sourceId}
  earlyPrograms: [],   // {id,type,therapist,frequency,startDate,status,notes}
  earlyLogs: [],        // {id,date,category(物理/職能/語言),content,milestoneId}
  people: [],            // {id,name,role,relation,emoji,note}
  photos: [],             // {id,dataUrl,caption,date,tag,milestoneId}
  vaccines: [],         // {id,name,date,done}
  visits: [],              // {id,date,hospital,department,doctor,note,earlyLogId}
  growth: [],             // {id,date,height,weight}
  outings: [],            // {id,location,date,peopleIds[],note,photos[]}
  meta: { version: 1, lastModified: null }
};

function loadDB(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return structuredClone(DEFAULT_DB);
    const parsed = JSON.parse(raw);
    // merge to ensure new fields exist when schema grows
    return Object.assign(structuredClone(DEFAULT_DB), parsed);
  }catch(e){
    console.error('讀取資料庫失敗', e);
    return structuredClone(DEFAULT_DB);
  }
}

function saveDB(db){
  db.meta.lastModified = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
}

let DB = loadDB();

function uid(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=> t.classList.remove('show'), 2200);
}

/* 匯出 / 匯入 備份 */
function exportBackup(){
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `垚垚成長記錄_備份_${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('備份已下載 📦');
}

function importBackup(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed || typeof parsed !== 'object') throw new Error('格式錯誤');
      DB = Object.assign(structuredClone(DEFAULT_DB), parsed);
      saveDB(DB);
      showToast('資料已還原 🌸');
      render();
    }catch(err){
      alert('檔案格式不正確，無法匯入。');
    }
  };
  reader.readAsText(file);
}

/* ============================================================
   路由 / 全域狀態
   ============================================================ */
const TABS = [
  { id:'home',     label:'首頁',   icon:'🏠' },
  { id:'timeline', label:'大事記', icon:'⭐' },
  { id:'early',    label:'早療',   icon:'🌱' },
  { id:'people',   label:'人際圈', icon:'👥' },
  { id:'photos',   label:'相簿',   icon:'📸' },
  { id:'medical',  label:'醫療',   icon:'🩺' },
  { id:'outings',  label:'出遊',   icon:'🧳' },
];

let currentTab = 'home';

function setTab(id){
  currentTab = id;
  render();
  window.scrollTo(0,0);
}

/* ============================================================
   殼層渲染 Shell Render
   ============================================================ */
function navItemsHTML(activeId, isBottom){
  return TABS.map(t => `
    <button class="nav-item ${t.id===activeId?'active':''}" onclick="setTab('${t.id}')">
      <span class="ic">${t.icon}</span>
      <span>${t.label}</span>
      ${isBottom && t.id===activeId ? '<span class="dot"></span>' : ''}
    </button>
  `).join('');
}

function renderShell(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="emoji">🐰</span>
        <div>
          <div class="title">${DB.child.name || '垚垚'}的<br/>成長故事書</div>
        </div>
      </div>
      ${navItemsHTML(currentTab, false)}
      <div style="flex:1"></div>
      <button class="btn btn-sm" style="width:100%; justify-content:center; margin-bottom:8px;" onclick="openSearchModal()">🔍 搜尋紀錄</button>
      <button class="btn btn-sm" style="width:100%; justify-content:center; margin-bottom:8px;" onclick="exportBackup()">📦 匯出備份</button>
      <label class="btn btn-sm" style="width:100%; justify-content:center; cursor:pointer;">
        📂 匯入備份
        <input type="file" accept="application/json" style="display:none" onchange="importBackup(this.files[0])">
      </label>
    </aside>
    <main id="main">
      <div class="topbar">
        <span class="emoji">🐰</span>
        <div style="flex:1;">
          <div class="title">${DB.child.name || '垚垚'}的成長故事書</div>
          <div class="sub">專屬回憶資料庫</div>
        </div>
        <button class="modal-close" style="width:36px;height:36px;font-size:16px;" onclick="openSearchModal()">🔍</button>
      </div>
      <div id="page"></div>
    </main>
    <nav class="bottom-nav">
      ${navItemsHTML(currentTab, true)}
    </nav>
  `;
}

/* ============================================================
   頁面渲染 (各模組將陸續掛上 window.PAGES)
   ============================================================ */
window.PAGES = {};

function render(){
  renderShell();
  const page = document.getElementById('page');
  const renderer = window.PAGES[currentTab];
  if(renderer){
    page.innerHTML = renderer();
    if(window.AFTER_RENDER && window.AFTER_RENDER[currentTab]){
      window.AFTER_RENDER[currentTab]();
    }
  } else {
    page.innerHTML = `<div class="empty-state"><div class="ic">🚧</div><div class="msg">這個區塊還在蓋造中…</div></div>`;
  }
}

/* ============================================================
   共用小工具 Helpers
   ============================================================ */
function fmtDate(d){
  if(!d) return '';
  return d.replaceAll('-', '/');
}

function ageString(birthdate){
  if(!birthdate) return '尚未填寫生日';
  const b = new Date(birthdate);
  const n = new Date();
  if(isNaN(b.getTime())) return '';
  let y = n.getFullYear() - b.getFullYear();
  let m = n.getMonth() - b.getMonth();
  let d = n.getDate() - b.getDate();
  if(d < 0) m--;
  if(m < 0){ y--; m += 12; }
  if(y > 0) return `${y}歲${m}個月`;
  return `${m}個月大`;
}

function daysAgo(dateStr){
  if(!dateStr) return Infinity;
  const d = new Date(dateStr);
  if(isNaN(d.getTime())) return Infinity;
  const diff = (new Date().setHours(0,0,0,0) - d.setHours(0,0,0,0)) / 86400000;
  return diff;
}

function escapeHtml(str){
  if(str===undefined||str===null) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if(width > height && width > maxDim){
          height = Math.round(height * (maxDim/width));
          width = maxDim;
        } else if(height >= width && height > maxDim){
          width = Math.round(width * (maxDim/height));
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const MILESTONE_CATEGORY_TAG = {
  '成長':'tag-pink', '語言':'tag-sky', '早療':'tag-mint',
  '旅遊':'tag-cream', '學習':'tag-sky', '其他':'tag-gray'
};

/* 加入大事記 (供其他模組呼叫，例如早療日誌/相簿 勾選同步) */
function addMilestone({date, icon, title, desc, category, sourceType, sourceId}){
  const m = { id: uid(), date, icon: icon||'⭐', title, desc: desc||'', category: category||'成長', sourceType: sourceType||null, sourceId: sourceId||null };
  DB.milestones.push(m);
  saveDB(DB);
  return m;
}

/* ============================================================
   首頁 Home
   ============================================================ */
function buildDigest(days){
  const items = [];
  const push = (date, icon, text, tab) => {
    if(daysAgo(date) <= days && daysAgo(date) >= 0){
      items.push({date, icon, text, tab});
    }
  };
  DB.milestones.forEach(m => push(m.date, m.icon||'⭐', `大事記：${m.title}`, 'timeline'));
  DB.earlyLogs.forEach(l => push(l.date, l.category==='語言'?'🗣️':l.category==='職能'?'🤲':'🏃', `早療日誌(${l.category})：${l.content}`, 'early'));
  DB.photos.forEach(p => push(p.date, '📸', `新增照片：${p.caption||'(無說明)'}`, 'photos'));
  DB.visits.forEach(v => push(v.date, '🩺', `就診：${v.hospital||''} ${v.department||''}`, 'medical'));
  DB.growth.forEach(g => push(g.date, '📏', `量身高體重：${g.height||'-'}cm / ${g.weight||'-'}kg`, 'medical'));
  DB.outings.forEach(o => push(o.date, '🧳', `出遊：${o.location}`, 'outings'));
  DB.vaccines.filter(v=>v.done).forEach(v => push(v.date, '💉', `接種疫苗：${v.name}`, 'medical'));
  items.sort((a,b)=> b.date.localeCompare(a.date));
  return items;
}

function saveMilestone(id){
  const date = document.getElementById('m-date').value;
  const icon = document.getElementById('m-icon').value;
  const title = document.getElementById('m-title').value.trim();
  const desc = document.getElementById('m-desc').value.trim();
  const cat = document.querySelector('#m-cat-row .chip.active');
  const category = cat ? cat.dataset.cat : '成長';

  if(!date || !title){ alert('請填寫日期和標題'); return; }

  if(id){
    const m = DB.milestones.find(x=>x.id===id);
    Object.assign(m, {date, icon, title, desc, category});
  } else {
    addMilestone({date, icon, title, desc, category});
  }
  saveDB(DB);
  document.querySelector('.modal-backdrop').remove();
  showToast('大事記已儲存 ⭐');
  render();
}

function deleteMilestone(id){
  if(!confirm('確定要刪除這筆大事記嗎？')) return;
  DB.milestones = DB.milestones.filter(m=>m.id!==id);
  saveDB(DB);
  showToast('已刪除');

}

function saveProgram(id){
  const type = document.querySelector('#p-type-row .chip.active').dataset.type;
  const therapist = document.getElementById('p-therapist').value.trim();
  const frequency = document.getElementById('p-frequency').value.trim();
  const startDate = document.getElementById('p-startdate').value;
  const status = document.querySelector('#p-status-row .chip.active').dataset.status;
  const notes = document.getElementById('p-notes').value.trim();

  if(id){
    Object.assign(DB.earlyPrograms.find(p=>p.id===id), {type,therapist,frequency,startDate,status,notes});

function departmentIcon(dep){

  if(dep.includes('眼')) return '👁️';
  if(dep.includes('皮膚')) return '🧴';

  return '🏥';
}

/* --- 成長曲線 SVG --- */
function renderGrowthChart(data){
  const W = 600, H = 220, padL = 38, padR = 16, padT = 16, padB = 28;
  const heights = data.map(g=>parseFloat(g.height)||0);
  const weights = data.map(g=>parseFloat(g.weight)||0);
  const maxH = Math.max(...heights, 1) * 1.1;
  const minH = Math.min(...heights) * 0.9;
  const maxW = Math.max(...weights, 1) * 1.2;

  const x = (i) => padL + (i/(data.length-1)) * (W-padL-padR);
  const yH = (v) => H-padB - ((v-minH)/(maxH-minH || 1)) * (H-padT-padB);
  const yW = (v) => H-padB - (v/(maxW||1)) * (H-padT-padB);

  const heightPts = data.map((g,i)=>`${x(i)},${yH(parseFloat(g.height)||0)}`).join(' ');
  const weightPts = data.map((g,i)=>`${x(i)},${yW(parseFloat(g.weight)||0)}`).join(' ');
  const heightArea = `${x(0)},${H-padB} ${heightPts} ${x(data.length-1)},${H-padB}`;

  return `
  <svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto; overflow:visible;">
    ${[0,1,2,3].map(i => `<line x1="${padL}" y1="${padT + i*(H-padT-padB)/3}" x2="${W-padR}" y2="${padT + i*(H-padT-padB)/3}" stroke="#F1E4D8" stroke-width="1"/>`).join('')}
    <polygon points="${heightArea}" fill="var(--pink)" opacity="0.18"/>
    <polyline points="${heightPts}" fill="none" stroke="var(--pink-deep)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="${weightPts}" fill="none" stroke="var(--sky-deep)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,5"/>
    ${data.map((g,i)=>`<circle cx="${x(i)}" cy="${yH(parseFloat(g.height)||0)}" r="4.5" fill="#fff" stroke="var(--pink-deep)" stroke-width="2.5"/>`).join('')}
    ${data.map((g,i)=>`<circle cx="${x(i)}" cy="${yW(parseFloat(g.weight)||0)}" r="4" fill="#fff" stroke="var(--sky-deep)" stroke-width="2.5"/>`).join('')}
    ${data.map((g,i)=> i%Math.ceil(data.length/6 || 1)===0 ? `<text x="${x(i)}" y="${H-8}" font-size="9" fill="var(--ink-faint)" text-anchor="middle">${fmtDate(g.date).slice(5)}</text>` : '').join('')}
  </svg>
  <div style="display:flex; gap:16px; justify-content:center; margin-top:6px;">
    <div style="display:flex; align-items:center; gap:5px; font-size:11px; color:var(--ink-soft);"><span style="width:14px;height:3px;background:var(--pink-deep);border-radius:2px;display:inline-block;"></span>身高(cm)</div>
    <div style="display:flex; align-items:center; gap:5px; font-size:11px; color:var(--ink-soft);"><span style="width:14px;height:3px;background:var(--sky-deep);border-radius:2px;display:inline-block;"></span>體重(kg)</div>
  </div>
  `;
}

let __outingPhotoBuffer = [];

  const editing = id ? DB.outings.find(o=>o.id===id) : null;

  const selectedPeople = editing ? (editing.peopleIds||[]) : [];

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-head"><h3>${editing?'✏️ 編輯出遊紀錄':'🧳 新增出遊紀錄'}</h3><button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">✕</button></div>
      <div class="row2">
        <div class="field"><label>地點</label><input id="o-location" value="${editing?escapeHtml(editing.location):''}" placeholder="台北動物園"></div>
        <div class="field"><label>日期</label><input id="o-date" type="date" value="${editing?editing.date:new Date().toISOString().slice(0,10)}"></div>
      </div>
      <div class="field">
        <label>同行的人</label>
        <div class="chip-row" id="o-people-row">
          ${DB.people.length===0 ? `<div style="font-size:12px; color:var(--ink-faint);">尚未建立人際圈，可先到「人際圈」新增</div>` :
            DB.people.map(p=>`<span class="chip ${selectedPeople.includes(p.id)?'active':''}" data-pid="${p.id}" onclick="this.classList.toggle('active')">${p.emoji||'👤'} ${escapeHtml(p.name)}</span>`).join('')}
        </div>
      </div>
      <div class="field"><label>感想</label><textarea id="o-note" placeholder="今天我們…">${editing?escapeHtml(editing.note):''}</textarea></div>
      <div class="field">
        <label>照片</label>
        <input id="o-photo-input" type="file" accept="image/*" multiple onchange="handleOutingPhotoSelect(this)">
        <div id="o-photo-preview" style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" style="flex:1; justify-content:center;" onclick="saveOuting('${editing?editing.id:''}')">儲存</button>
        <button class="btn" style="flex:1; justify-content:center;" onclick="this.closest('.modal-backdrop').remove()">取消</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  renderOutingPhotoPreview();
}

function renderOutingPhotoPreview(){
  const box = document.getElementById('o-photo-preview');
  if(!box) return;
  box.innerHTML = __outingPhotoBuffer.map((src,i)=>`
    <div style="position:relative;">
      <img src="${src}" style="width:56px; height:56px; object-fit:cover; border-radius:8px;">
      <button onclick="removeOutingPhoto(${i})" style="position:absolute; top:-6px; right:-6px; width:20px; height:20px; border-radius:50%; background:#fff; border:1px solid var(--border); font-size:10px; cursor:pointer;">✕</button>
    </div>
  `).join('');
}

function removeOutingPhoto(i){
  __outingPhotoBuffer.splice(i,1);
  renderOutingPhotoPreview();
}

async function handleOutingPhotoSelect(input){
  for(const file of input.files){
    const compressed = await compressImage(file, 600, 0.75);
    __outingPhotoBuffer.push(compressed);
  }
  renderOutingPhotoPreview();
  input.value = '';
}

function saveOuting(id){
  const location = document.getElementById('o-location').value.trim();
  const date = document.getElementById('o-date').value;
  const note = document.getElementById('o-note').value.trim();
  const peopleIds = Array.from(document.querySelectorAll('#o-people-row .chip.active')).map(c=>c.dataset.pid);

  if(!location || !date){ alert('請填寫地點和日期'); return; }

  if(id){
    Object.assign(DB.outings.find(o=>o.id===id), {location,date,note,peopleIds, photos:[...__outingPhotoBuffer]});
  } else {
    DB.outings.push({id:uid(), location,date,note,peopleIds, photos:[...__outingPhotoBuffer]});
  }
  saveDB(DB);
  document.querySelector('.modal-backdrop').remove();
  showToast('出遊紀錄已儲存 🧳');
  render();
}

function deleteOuting(id){
  if(!confirm('確定要刪除這篇出遊紀錄嗎？')) return;
  DB.outings = DB.outings.filter(o=>o.id!==id);
  saveDB(DB);
  render();
}

/* ============================================================
   全站搜尋 Search
   ============================================================ */
function searchAll(keyword){
  if(!keyword || !keyword.trim()) return [];
  const kw = keyword.trim().toLowerCase();
  const results = [];

  DB.milestones.forEach(m => {
    if((m.title+m.desc+m.category).toLowerCase().includes(kw))
      results.push({tab:'timeline', icon:m.icon, title:m.title, sub:`大事記 · ${fmtDate(m.date)}`, date:m.date});
  });
  DB.earlyLogs.forEach(l => {
    if((l.content+l.category).toLowerCase().includes(kw))
      results.push({tab:'early', icon:EARLY_TYPE_ICON[l.category]||'🌱', title:l.content, sub:`早療日誌(${l.category}) · ${fmtDate(l.date)}`, date:l.date});
  });
  DB.earlyPrograms.forEach(p => {
    if((p.type+p.therapist+p.notes).toLowerCase().includes(kw))
      results.push({tab:'early', icon:EARLY_TYPE_ICON[p.type]||'🌱', title:`${p.type} - ${p.therapist}`, sub:'療育課程', date:p.startDate||''});
  });
  DB.people.forEach(p => {
    if((p.name+p.role+p.note+p.relation).toLowerCase().includes(kw))
      results.push({tab:'people', icon:p.emoji||'👤', title:p.name, sub:`人際圈 · ${p.relation}`, date:''});
  });
  DB.photos.forEach(p => {
    if((p.caption+p.tag).toLowerCase().includes(kw))
      results.push({tab:'photos', icon:'📸', title:p.caption||'(無說明)', sub:`相簿 · ${fmtDate(p.date)}`, date:p.date});
  });
  DB.vaccines.forEach(v => {
    if(v.name.toLowerCase().includes(kw))
      results.push({tab:'medical', icon:'💉', title:v.name, sub:'疫苗記錄', date:v.date||''});
  });
  DB.visits.forEach(v => {
    if((v.hospital+v.department+v.doctor+v.note).toLowerCase().includes(kw))
      results.push({tab:'medical', icon:'🏥', title:`${v.hospital||''} ${v.department||''}`, sub:`就診紀錄 · ${fmtDate(v.date)}`, date:v.date});
  });
  DB.outings.forEach(o => {
    if((o.location+o.note).toLowerCase().includes(kw))
      results.push({tab:'outings', icon:'🧳', title:o.location, sub:`出遊記錄 · ${fmtDate(o.date)}`, date:o.date});
  });

  results.sort((a,b)=> (b.date||'').localeCompare(a.date||''));
  return results;
}

function openSearchModal(){
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-head"><h3>🔍 搜尋垚垚的紀錄</h3><button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">✕</button></div>
      <div class="field" style="margin-bottom:10px;">
        <input id="search-input" placeholder="輸入關鍵字，例如：跳、王老師、動物園…" oninput="renderSearchResults()" autofocus>
      </div>
      <div id="search-results"></div>
    </div>
  `;
  document.body.appendChild(backdrop);
  setTimeout(()=> document.getElementById('search-input').focus(), 100);
}

function renderSearchResults(){
  const kw = document.getElementById('search-input').value;
  const box = document.getElementById('search-results');
  if(!kw.trim()){ box.innerHTML = `<div class="empty-state" style="padding:20px;"><div class="ic">🔍</div><div class="msg">輸入關鍵字開始搜尋</div></div>`; return; }
  const results = searchAll(kw);
  if(results.length===0){ box.innerHTML = `<div class="empty-state" style="padding:20px;"><div class="ic">🌫️</div><div class="msg">沒有找到符合的紀錄</div></div>`; return; }
  box.innerHTML = results.map(r => `
    <div style="display:flex; gap:10px; padding:10px 4px; border-bottom:1px dashed var(--border); cursor:pointer;" onclick="setTab('${r.tab}'); document.querySelector('.modal-backdrop').remove();">
      <span style="font-size:20px;">${r.icon}</span>
      <div style="flex:1; min-width:0;">
        <div style="font-size:13.5px; font-weight:700; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(r.title)}</div>
        <div style="font-size:11px; color:var(--ink-faint);">${r.sub}</div>
      </div>
    </div>
  `).join('');
}

document.addEventListener('DOMContentLoaded', render);
